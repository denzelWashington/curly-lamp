name: CI pipepline
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu:latest
    steps:
      - name: checkout code
      - uses: actions/checkout@v6
      - name: set up jdk
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven
      - name: Run the Maven verify phase
        run: mvn --batch-mode --update-snapshots verify
