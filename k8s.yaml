apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mon-java
  template:
    metadata:
      labels:
        app: mon-java
    spec:
      containers:
        - name: java-cont
          image: to-k8s:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: java-service
spec:
  selector:
    app: mon-java
  ports:
    - port: 80
      targetPort: 8080